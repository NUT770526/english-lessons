<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order the Words to Make Questions</title>
<style>
  body{
    font-family: Arial, sans-serif;
    background:#f6f0e8;
    color:#233044;
    margin:0;
    padding:24px;
    font-size:18px;
  }
  .container{
    max-width:950px;
    margin:auto;
    background:#fffdf9;
    padding:28px;
    border-radius:18px;
    box-shadow:0 8px 26px rgba(0,0,0,.08);
  }
  h1{
    text-align:center;
    color:#12345a;
    font-size:34px;
    margin-bottom:8px;
  }
  .subtitle{
    text-align:center;
    color:#5b6470;
    margin-bottom:24px;
  }
  .task{
    background:#f9f5ef;
    border:1px solid #dfd0bd;
    border-radius:16px;
    padding:18px;
    margin:20px 0;
  }
  .words, .answer{
    min-height:54px;
    border:2px dashed #d7c2a3;
    border-radius:14px;
    padding:12px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    background:white;
    margin-top:10px;
  }
  .answer{
    background:#fffaf2;
    border-color:#bda47d;
  }
  .word{
    background:#12345a;
    color:white;
    padding:10px 14px;
    border-radius:10px;
    cursor:grab;
    user-select:none;
    font-size:18px;
  }
  .word:active{cursor:grabbing;}
  .number{
    font-weight:bold;
    color:#12345a;
    font-size:22px;
  }
  .question-mark{
    font-size:24px;
    font-weight:bold;
    color:#12345a;
  }
  button{
    background:#12345a;
    color:white;
    border:none;
    border-radius:10px;
    padding:12px 18px;
    font-size:18px;
    cursor:pointer;
    margin:8px 5px 0 0;
  }
  button:hover{background:#1f4d7a;}
  .result{
    margin-top:12px;
    font-weight:bold;
    font-size:19px;
  }
  .correct{color:#287233;}
  .wrong{color:#b00020;}
  .hint{
    font-size:16px;
    color:#5b6470;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Order the words to make questions</h1>
  <p class="subtitle">Drag the words into the answer box. Then check your answer.</p>

  <div id="tasks"></div>

  <button onclick="checkAll()">Check all</button>
  <button onclick="showAll()">Show answers</button>
  <button onclick="resetAll()">Reset</button>
  <div id="finalResult" class="result"></div>
</div>

<script>
const tasks = [
  {
    words:["you","Are","married"],
    answer:["Are","you","married"]
  },
  {
    words:["Do","you","have","children"],
    answer:["Do","you","have","children"]
  },
  {
    words:["you","interesting","an","Did","job","have"],
    answer:["Did","you","have","an","interesting","job"]
  },
  {
    words:["last promotion","get","you","When","your","did"],
    answer:["When","did","you","get","your","last promotion"]
  },
  {
    words:["of","concerts","What kind","go to","do","you"],
    answer:["What kind","of","concerts","do","you","go to"]
  },
  {
    words:["do you","the weekends","What","do","at"],
    answer:["What","do","you","do","at","the weekends"]
  }
];

function shuffle(arr){
  return arr.map(x=>[Math.random(),x]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]);
}

function makeWord(text){
  const span = document.createElement("span");
  span.className = "word";
  span.draggable = true;
  span.textContent = text;
  span.addEventListener("dragstart", dragStart);
  return span;
}

let dragged = null;

function dragStart(e){
  dragged = e.target;
}

function allowDrop(e){ e.preventDefault(); }

function drop(e){
  e.preventDefault();
  const target = e.currentTarget;
  if(dragged){
    target.appendChild(dragged);
  }
}

function render(){
  const box = document.getElementById("tasks");
  box.innerHTML = "";
  tasks.forEach((task, i)=>{
    const div = document.createElement("div");
    div.className = "task";
    div.innerHTML = `
      <div><span class="number">${i+1}.</span> Put the words in the correct order:</div>
      <div class="hint">Words:</div>
      <div class="words" id="words${i}" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
      <div class="hint">Your question:</div>
      <div style="display:flex; align-items:center; gap:8px;">
        <div class="answer" id="answer${i}" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
        <span class="question-mark">?</span>
      </div>
      <button onclick="checkOne(${i})">Check</button>
      <button onclick="resetOne(${i})">Reset this</button>
      <div id="res${i}" class="result"></div>
    `;
    box.appendChild(div);
    const wordsBox = div.querySelector("#words"+i);
    shuffle(task.words).forEach(w=>wordsBox.appendChild(makeWord(w)));
  });
}

function getAnswer(i){
  return Array.from(document.getElementById("answer"+i).children).map(x=>x.textContent);
}

function checkOne(i){
  const user = getAnswer(i);
  const correct = tasks[i].answer;
  const res = document.getElementById("res"+i);
  if(JSON.stringify(user) === JSON.stringify(correct)){
    res.textContent = "Correct!";
    res.className = "result correct";
    return true;
  } else {
    res.textContent = "Try again. Correct answer: " + correct.join(" ") + "?";
    res.className = "result wrong";
    return false;
  }
}

function checkAll(){
  let score = 0;
  tasks.forEach((_,i)=>{ if(checkOne(i)) score++; });
  const final = document.getElementById("finalResult");
  final.textContent = `Your score: ${score}/${tasks.length}`;
  final.className = score === tasks.length ? "result correct" : "result wrong";
}

function showAll(){
  tasks.forEach((task,i)=>{
    const answerBox = document.getElementById("answer"+i);
    const wordsBox = document.getElementById("words"+i);
    answerBox.innerHTML = "";
    wordsBox.innerHTML = "";
    task.answer.forEach(w=>answerBox.appendChild(makeWord(w)));
    const res = document.getElementById("res"+i);
    res.textContent = task.answer.join(" ") + "?";
    res.className = "result correct";
  });
  document.getElementById("finalResult").textContent = "Answers are shown.";
  document.getElementById("finalResult").className = "result correct";
}

function resetOne(i){
  const answerBox = document.getElementById("answer"+i);
  const wordsBox = document.getElementById("words"+i);
  const all = [...Array.from(answerBox.children), ...Array.from(wordsBox.children)].map(x=>x.textContent);
  answerBox.innerHTML = "";
  wordsBox.innerHTML = "";
  shuffle(all).forEach(w=>wordsBox.appendChild(makeWord(w)));
  document.getElementById("res"+i).textContent = "";
}

function resetAll(){
  render();
  document.getElementById("finalResult").textContent = "";
}

render();
</script>
</body>
</html>
