<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Write the Questions</title>
<style>
:root{
  --purple:#4b1fb8;
  --light:#eee9ff;
  --border:#cfc7e8;
  --good:#16803b;
  --bad:#b42318;
  --text:#1f2430;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f8f7fc;
  color:var(--text);
}
.container{
  max-width:900px;
  margin:30px auto;
  background:white;
  padding:28px;
  border-radius:22px;
  box-shadow:0 10px 28px rgba(65,45,120,.12);
}
h1{
  margin:0 0 22px;
  color:var(--purple);
  font-size:clamp(26px,4vw,38px);
}
.example{
  background:var(--light);
  border-left:6px solid var(--purple);
  border-radius:12px;
  padding:14px 16px;
  margin-bottom:22px;
}
.question{
  padding:16px 0;
  border-bottom:1px solid #ece8f5;
}
.question:last-child{border-bottom:none}
.sentence{
  font-size:19px;
  line-height:1.5;
}
input[type="text"]{
  width:100%;
  max-width:560px;
  margin-top:10px;
  padding:12px 14px;
  border:1px solid var(--border);
  border-radius:11px;
  font-size:17px;
}
.bold{font-weight:700}
.feedback{
  margin-top:7px;
  font-weight:700;
}
.correct{color:var(--good)}
.incorrect{color:var(--bad)}
.btns{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:22px;
}
button{
  border:none;
  border-radius:11px;
  padding:11px 16px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}
.check{background:var(--purple);color:#fff}
.reset{background:#e9e6ef;color:#3d3947}
.score{
  margin-top:16px;
  font-size:18px;
  font-weight:700;
}
.note{
  margin-top:8px;
  color:#6c6780;
  font-size:14px;
}
</style>
</head>
<body>
<div class="container">
  <h1>📝 Write the questions for the words in bold</h1>

  <div class="example">
    <b>Example:</b><br>
    <span class="bold">My mother</span> drives a car every day. —
    <b>Who drives a car every day?</b>
  </div>

  <div id="exercise"></div>

  <div class="btns">
    <button class="check" onclick="checkAnswers()">Check answers</button>
    <button class="reset" onclick="resetExercise()">Try again</button>
  </div>

  <div class="score" id="score"></div>
  <div class="note">Write the full question, including the question mark.</div>
</div>

<script>
const items = [
  {
    sentence:'<span class="bold">My father</span> commutes by subway every day.',
    answers:['who commutes by subway every day?']
  },
  {
    sentence:'<span class="bold">Mike</span> bought his first car last week.',
    answers:['who bought his first car last week?']
  },
  {
    sentence:'<span class="bold">Sindy</span> hates commuting by buses.',
    answers:['who hates commuting by buses?','who hates commuting by bus?']
  },
  {
    sentence:'<span class="bold">I</span> lost the ticket for the plane.',
    answers:['who lost the ticket for the plane?']
  },
  {
    sentence:'<span class="bold">An accident</span> happened yesterday.',
    answers:['what happened yesterday?']
  }
];

function normalize(text){
  return text
    .trim()
    .toLowerCase()
    .replace(/[’]/g,"'")
    .replace(/\s+/g," ");
}

function render(){
  document.getElementById("score").textContent="";
  document.getElementById("exercise").innerHTML = items.map((item,i)=>`
    <div class="question" data-answers='${JSON.stringify(item.answers)}'>
      <div class="sentence">${i+1}. ${item.sentence}</div>
      <input type="text" placeholder="Write the question">
      <div class="feedback"></div>
    </div>
  `).join("");
}

function checkAnswers(){
  let score=0;
  document.querySelectorAll(".question").forEach(q=>{
    const input=q.querySelector("input");
    const feedback=q.querySelector(".feedback");
    const value=normalize(input.value);
    const answers=JSON.parse(q.dataset.answers).map(normalize);
    const ok=answers.includes(value);

    if(ok){
      score++;
      feedback.textContent="✓ Correct";
      feedback.className="feedback correct";
    }else{
      feedback.textContent="✗ Correct answer: "+JSON.parse(q.dataset.answers)[0];
      feedback.className="feedback incorrect";
    }
  });
  document.getElementById("score").textContent=`Score: ${score} / ${items.length}`;
}

function resetExercise(){
  render();
}

render();
</script>
</body>
</html>
