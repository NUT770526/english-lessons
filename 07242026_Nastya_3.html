<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar Vibe Check: Present Simple vs Present Continuous</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #818cf8, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .progress-container {
            width: 100%;
            background-color: #334155;
            border-radius: 8px;
            height: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6366f1, #38bdf8);
            transition: width 0.3s ease;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .rule-badge {
            display: inline-block;
            background: #312e81;
            color: #a5b4fc;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .sentence {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .options-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 15px;
        }

        .option-btn {
            background: #0f172a;
            border: 2px solid var(--border);
            color: var(--text);
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: #1e1b4b;
        }

        .option-btn.correct {
            background: #064e3b !important;
            border-color: var(--success) !important;
            color: #a7f3d0 !important;
        }

        .option-btn.wrong {
            background: #7f1d1d !important;
            border-color: var(--error) !important;
            color: #fecdd3 !important;
        }

        .feedback {
            margin-top: 15px;
            padding: 14px;
            border-radius: 10px;
            background: #0f172a;
            border-left: 4px solid var(--accent);
            font-size: 0.95rem;
        }

        .audio-btn {
            background: var(--border);
            color: var(--text);
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
        }

        .audio-btn:hover {
            background: #475569;
        }

        .next-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            float: right;
        }

        .next-btn:hover {
            background: var(--accent-hover);
        }

        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⚡ Grammar Vibe Check</h1>
        <p class="subtitle">Present Simple (привички/факти) VS Present Continuous (дія просто зараз)</p>
    </header>

    <div class="stats-bar">
        <div>Бали: <span id="score" style="color: #38bdf8;">0</span> / 100</div>
        <div>Питання: <span id="counter" style="color: #818cf8;">1 / 10</span></div>
    </div>

    <div class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>
    </div>

    <div id="quiz-box" class="card clearfix">
        <!-- Контент завантажується скриптом -->
    </div>
</div>

<script>
    const questions = [
        {
            badge: "Every day vs Now",
            sentence: "My friend is very reliable. He always ___ up on time for our lessons.",
            options: [
                "shows",
                "is showing"
            ],
            correct: 0,
            explain: "💡 **Present Simple** (shows): Слово **'always'** вказує на регулярну звичку або постійну рису характеру.",
            audioText: "My friend is very reliable. He always shows up on time for our lessons."
        },
        {
            badge: "Right now!",
            sentence: "Look! Anna is feeling really cheerful today. She ___ and singing right now!",
            options: [
                "smiles",
                "is smiling"
            ],
            correct: 1,
            explain: "💡 **Present Continuous** (is smiling): Маркер **'right now'** (просто зараз) показує дію, яка происходит прямо в цю хвилину.",
            audioText: "Look! Anna is feeling really cheerful today. She is smiling and singing right now!"
        },
        {
            badge: "General Habit",
            sentence: "Max has a passion for art. He ___ pretty cool pictures every evening.",
            options: [
                "draws",
                "is drawing"
            ],
            correct: 0,
            explain: "💡 **Present Simple** (draws): Маркер **'every evening'** вказує на регулярну діяльність.",
            audioText: "Max has a passion for art. He draws pretty cool pictures every evening."
        },
        {
            badge: "At the moment",
            sentence: "Why is Mark being so selfish today? He ___ his new game with anyone at the moment!",
            options: [
                "doesn't share",
                "is not sharing"
            ],
            correct: 1,
            explain: "💡 **Present Continuous** (is not sharing): Маркер **'at the moment'** вказує на тимчасову ситуацію зараз.",
            audioText: "Why is Mark being so selfish today? He is not sharing his new game with anyone at the moment!"
        },
        {
            badge: "Personality & Habit",
            sentence: "She is a very positive person. She usually ___ the good side in everything.",
            options: [
                "sees",
                "is seeing"
            ],
            correct: 0,
            explain: "💡 **Present Simple** (sees): Маркер **'usually'** передає звичку та постоянное состояние.",
            audioText: "She is a very positive person. She usually sees the good side in everything."
        },
        {
            badge: "Action in progress",
            sentence: "Listen! Why ___ so miserable right now? Did something bad happen?",
            options: [
                "do you cry",
                "are you crying"
            ],
            correct: 1,
            explain: "💡 **Present Continuous** (are you crying): Заклик **'Listen!'** та маркер **'right now'** вказують на дію прямо в момент мовлення.",
            audioText: "Listen! Why are you crying right now? Did something bad happen?"
        },
        {
            badge: "Negative Habit",
            sentence: "Tim is quite unreliable. He never ___ his promises.",
            options: [
                "keeps",
                "is keeping"
            ],
            correct: 0,
            explain: "💡 **Present Simple** (keeps): Слово **'never'** показує регулярну поведінку/принцип.",
            audioText: "Tim is quite unreliable. He never keeps his promises."
        },
        {
            badge: "Temporary Situation",
            sentence: "I usually play football on Fridays, but today I ___ a rather difficult test.",
            options: [
                "write",
                "am writing"
            ],
            correct: 1,
            explain: "💡 **Present Continuous** (am writing): Маркер **'today'** показує виняток і тимчасову дію.",
            audioText: "I usually play football on Fridays, but today I am writing a rather difficult test."
        },
        {
            badge: "Question about Habits",
            sentence: "___ in people when they tell you exciting stories?",
            options: [
                "Do you usually believe",
                "Are you usually believing"
            ],
            correct: 0,
            explain: "💡 **Present Simple** (Do you believe): Питання про загальну ставлення/віру (state verb + usually).",
            audioText: "Do you usually believe in people when they tell you exciting stories?"
        },
        {
            badge: "Generosity action",
            sentence: "Look at Ben! He is very generous. He ___ his snacks with his friends right now.",
            options: [
                "shares",
                "is sharing"
            ],
            correct: 1,
            explain: "💡 **Present Continuous** (is sharing): **'Look at Ben!'** та **'right now'** — заклики до дії у моменті.",
            audioText: "Look at Ben! He is very generous. He is sharing his snacks with his friends right now."
        }
    ];

    let currentIdx = 0;
    let score = 0;

    function renderQuestion() {
        const q = questions[currentIdx];
        const quizBox = document.getElementById('quiz-box');

        document.getElementById('counter').textContent = `${currentIdx + 1} / ${questions.length}`;
        document.getElementById('progress-bar').style.width = `${((currentIdx) / questions.length) * 100}%`;

        quizBox.innerHTML = `
            <div class="rule-badge">${q.badge}</div>
            <div class="sentence">${q.sentence.replace('___', '<u style="color:#38bdf8;">???</u>')}</div>
            
            <div class="options-grid" id="options">
                ${q.options.map((opt, i) => `
                    <button class="option-btn" onclick="checkAnswer(${i})">${opt}</button>
                `).join('')}
            </div>

            <div id="feedback" style="display:none;"></div>
            <button id="next-btn" class="next-btn" style="display:none;" onclick="nextQuestion()">Далі ➔</button>
        `;
    }

    function checkAnswer(selectedIdx) {
        const q = questions[currentIdx];
        const buttons = document.querySelectorAll('.option-btn');
        const feedback = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');

        buttons.forEach(btn => btn.disabled = true);

        if (selectedIdx === q.correct) {
            buttons[selectedIdx].classList.add('correct');
            score += 10;
            document.getElementById('score').textContent = score;
            feedback.innerHTML = `
                <div class="feedback">
                    <span style="color: var(--success); font-weight: bold;">✅ Чудово!</span><br>
                    ${q.explain}
                    <br>
                    <button class="audio-btn" onclick="speak('${q.audioText.replace(/'/g, "\\'")}')">🔊 Озвучити речення</button>
                </div>
            `;
            speak(q.audioText);
        } else {
            buttons[selectedIdx].classList.add('wrong');
            buttons[q.correct].classList.add('correct');
            feedback.innerHTML = `
                <div class="feedback">
                    <span style="color: var(--error); font-weight: bold;">❌ Не зовсім!</span><br>
                    ${q.explain}
                </div>
            `;
        }

        feedback.style.display = 'block';
        nextBtn.style.display = 'inline-block';
    }

    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            renderQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('progress-bar').style.width = '100%';
        const quizBox = document.getElementById('quiz-box');
        quizBox.innerHTML = `
            <div style="text-align:center; padding: 20px 0;">
                <h2>🎉 Вітаємо! Тренування завершено!</h2>
                <p style="font-size: 1.4rem; margin: 20px 0;">Твій результат: <b style="color:#38bdf8;">${score}</b> з 100 балів!</p>
                <button class="next-btn" style="float:none;" onclick="resetQuiz()">Пройти ще раз 🔄</button>
            </div>
        `;

        confetti({
            particleCount: 150,
            spread: 100,
            origin: { y: 0.6 }
        });
    }

    function resetQuiz() {
        currentIdx = 0;
        score = 0;
        document.getElementById('score').textContent = score;
        renderQuestion();
    }

    renderQuestion();
</script>

</body>
</html>
