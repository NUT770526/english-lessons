<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Remember the Words</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f7fb;margin:0;padding:30px;color:#233;}
.container{max-width:850px;margin:auto;background:#fff;padding:25px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.1);}
h1{text-align:center;color:#2d5baf}
.q{margin:18px 0;padding:15px;border:1px solid #dde5f2;border-radius:12px}
button.option{display:block;width:100%;margin:8px 0;padding:12px;border:none;border-radius:10px;background:#eef4ff;font-size:18px;cursor:pointer}
button.option:hover{background:#dbe9ff}
.correct{background:#b8f5c7!important}
.wrong{background:#ffd0d0!important}
#score{text-align:center;font-size:22px;font-weight:bold;margin-top:20px}
#reset{display:block;margin:20px auto;padding:12px 26px;font-size:18px;border:none;border-radius:10px;background:#2d5baf;color:#fff;cursor:pointer}
</style>
</head>
<body>
<div class="container">
<h1>Remember the Words</h1>
<p><b>Choose the correct word.</b></p>

<div id="quiz"></div>
<div id="score"></div>
<button id="reset">Try Again</button>
</div>

<script>
const data=[
["My ___ is Anna.",["name","holiday","plane"],0],
["It is a ___.",["table","baby","mail"],0],
["She is on ___.",["holiday","Spain","day"],0],
["He is on the ___.",["plane","table","name"],0],
["She is ___.",["late","May","holiday"],0],
["It is ___.",["May","Spain","mail"],0],
["He is in ___.",["Spain","May","holiday"],0],
["It is my ___.",["mail","plane","table"],0],
["It is a ___.",["baby","lady","day"],0],
["She is a ___.",["lady","baby","name"],0],
["It is a beautiful ___.",["day","holiday","plane"],0],
["I am ___.",["late","Spain","table"],0]
];
const quiz=document.getElementById("quiz");
let score=0,answered=0;
function render(){
quiz.innerHTML="";score=0;answered=0;
document.getElementById("score").textContent="";
data.forEach((q,i)=>{
 const d=document.createElement("div");d.className="q";
 d.innerHTML="<h3>"+(i+1)+". "+q[0]+"</h3>";
 q[1].forEach((opt,j)=>{
   const b=document.createElement("button");
   b.className="option";b.textContent=opt;
   b.onclick=()=>{
     if(d.dataset.done)return;
     d.dataset.done=1;answered++;
     if(j===q[2]){b.classList.add("correct");score++;}
     else{
       b.classList.add("wrong");
       d.querySelectorAll("button")[q[2]].classList.add("correct");
     }
     if(answered===data.length){
       document.getElementById("score").textContent="Score: "+score+" / "+data.length;
     }
   };
   d.appendChild(b);
 });
 quiz.appendChild(d);
});
}
render();
document.getElementById("reset").onclick=render;
</script>
</body>
</html>
