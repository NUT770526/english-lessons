<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teen Vibe Check 2.0: Fix the Glitch!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #06b6d4;
            --primary-hover: #0891b2;
            --secondary: #f43f5e;
            --bg: #090d16;
            --card-bg: #151c2c;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #1e293b;
            --success: #10b981;
            --error: #f43f5e;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #38bdf8, #f43f5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* Статистика */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .stat-val {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--accent);
        }

        .progress-container {
            width: 100%;
            background-color: #1e293b;
            border-radius: 10px;
            height: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.4s ease;
        }

        /* Карточки */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .badge {
            display: inline-block;
            background: #1e293b;
            color: #38bdf8;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .situation {
            font-size: 0.95rem;
            color: #cbd5e1;
            margin-bottom: 12px;
            background: #0d1322;
            padding: 10px 14px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .wrong-sentence {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f43f5e;
            margin-bottom: 15px;
            text-decoration: line-through;
            text-decoration-thickness: 2px;
        }

        .options-grid {
            display: grid;
            gap: 10px;
            margin-bottom: 15px;
        }

        .option-btn {
            background: #0d1322;
            border: 1px solid var(--border);
            color: #f8fafc;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #1e293b;
        }

        .option-btn.correct-choice {
            background: #064e3b !important;
            border-color: var(--success) !important;
            color: #a7f3d0 !important;
        }

        .option-btn.wrong-choice {
            background: #881337 !important;
            border-color: var(--error) !important;
            color: #fecdd3 !important;
        }

        .feedback {
            margin-top: 10px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .audio-btn {
            background: #1e293b;
            color: #f8fafc;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .audio-btn:hover {
            background: #334155;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>👾 Vibe Checker 2.0: Fix the Glitch!</h1>
        <p class="subtitle">У кожному реченні є помилка підсилювача або слова. Знайди і обери правильний вариант!</p>
    </header>

    <div class="stats-bar">
        <div>Бали: <span id="score" class="stat-val">0</span> / 100</div>
        <div>Прогрес: <span id="progress-text" class="stat-val">0 / 10</span></div>
    </div>

    <div class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>
    </div>

    <div id="quiz-list"></div>
</div>

<script>
    const questions = [
        {
            id: 1,
            badge: "Task 1 • Modifiers & Character",
            situation: "Ситуація: Денис обіцяв скинути домашку о 18:00, але вимкнув телефон і пішов гуляти.",
            wrong: "Glitch: Denis is very reliable. He turned off his phone.",
            options: [
                "Denis is rather unreliable. He turned off his phone.",
                "Denis is so reliable. He turned off his phone.",
                "Denis is quite cheerful. He turned off his phone."
            ],
            correctIdx: 0,
            explain: "💡 'Unreliable' (ненадійний) з підсилювачем 'rather' (доволі) ідеально підходить за контекстом.",
            audioText: "Denis is rather unreliable. He turned off his phone."
        },
        {
            id: 2,
            badge: "Task 2 • Mood & Degree",
            situation: "Ситуація: Катя виграла грант на навчання! Вона сяє від щастя.",
            wrong: "Glitch: Kate feels pretty miserable today.",
            options: [
                "Kate feels quite miserable today.",
                "Kate is really cheerful today!",
                "Kate is rather selfish today."
            ],
            correctIdx: 1,
            explain: "💡 'Miserable' — це пригнічена, а Катя щаслива! Тож 'really cheerful' (справді життєрадісна).",
            audioText: "Kate is really cheerful today!"
        },
        {
            id: 3,
            badge: "Task 3 • Teamwork & Selfishness",
            situation: "Ситуація: Марк забрал всю піцу і навіть не запропонував друзям ні шматочка. Емоції киплять!",
            wrong: "Glitch: Mark is quiet selfish with food.",
            options: [
                "Mark is so selfish with food!",
                "Mark is rather cheerful with food.",
                "Mark is very positive with food."
            ],
            correctIdx: 0,
            explain: "💡 Для сильної емоції обурення використовуємо 'so selfish!' (настільки егоїстичний!).",
            audioText: "Mark is so selfish with food!"
        },
        {
            id: 4,
            badge: "Task 4 • Team Projects",
            situation: "Ситуація: Оля завжди виконує свою частину презентації вчасно. На неї можна розраховувати.",
            wrong: "Glitch: Olya is a pretty unreliable classmate.",
            options: [
                "Olya is a rather miserable classmate.",
                "Olya is a very reliable classmate.",
                "Olya is a quite selfish classmate."
            ],
            correctIdx: 1,
            explain: "💡 На Олю можна розраховувати, тому вона 'very reliable' (дуже надійна).",
            audioText: "Olya is a very reliable classmate."
        },
        {
            id: 5,
            badge: "Task 5 • Exam Results",
            situation: "Ситуація: Влад провалив тест, до якого готувався місяць. Йому дуже сумно.",
            wrong: "Glitch: Vlad was so positive after the exam result.",
            options: [
                "Vlad was pretty cheerful after the exam result.",
                "Vlad was rather positive after the exam result.",
                "Vlad felt really miserable after the exam result."
            ],
            correctIdx: 2,
            explain: "💡 Після провалу людина почувається 'really miserable' (справді пригніченою).",
            audioText: "Vlad felt really miserable after the exam result."
        },
        {
            id: 6,
            badge: "Task 6 • Attitude & Vibe",
            situation: "Ситуація: Аня завжди шукає плюси навіть у складних завданнях.",
            wrong: "Glitch: Anya has a quite miserable attitude.",
            options: [
                "Anya has a pretty positive attitude to challenges.",
                "Anya has a rather selfish attitude to challenges.",
                "Anya has a so unreliable attitude to challenges."
            ],
            correctIdx: 0,
            explain: "💡 Позитивний підхід — це 'pretty positive attitude' (достатньо позитивне ставлення).",
            audioText: "Anya has a pretty positive attitude to challenges."
        },
        {
            id: 7,
            badge: "Task 7 • Explanations & Clarity",
            situation: "Ситуація: Пояснення вчителя було зрозумілим, хоч і трохи заплутаним під кінець.",
            wrong: "Glitch: The explanation was miserable clear.",
            options: [
                "The explanation was selfish clear.",
                "The explanation was quite clear and helpful.",
                "The explanation was unreliable clear."
            ],
            correctIdx: 1,
            explain: "💡 'Quite clear' = досить зрозуміле (quite вживається для помірного ступеня).",
            audioText: "The explanation was quite clear and helpful."
        },
        {
            id: 8,
            badge: "Task 8 • Difficult Tasks",
            situation: "Ситуація: Завдання з кодингу виявилося значно складнішим, ніж очікували геймери.",
            wrong: "Glitch: This task is cheerful difficult for beginners.",
            options: [
                "This task is rather difficult for beginners.",
                "This task is reliable difficult for beginners.",
                "This task is positive difficult for beginners."
            ],
            correctIdx: 0,
            explain: "💡 'Rather difficult' = доволі складне (rather підсилює складність краще ніж quite).",
            audioText: "This task is rather difficult for beginners."
        },
        {
            id: 9,
            badge: "Task 9 • Meeting & Emotions",
            situation: "Ситуація: Зустріч з розробниками гри пройшла набагато крутіше, ніж ми очікували!",
            wrong: "Glitch: I selfish enjoyed today's stream.",
            options: [
                "I rather enjoyed today's stream.",
                "I really enjoyed today's stream!",
                "I unreliable enjoyed today's stream."
            ],
            correctIdx: 1,
            explain: "💡 Щире захоплення передаємо за допомогою 'I really enjoyed...'",
            audioText: "I really enjoyed today's stream!"
        },
        {
            id: 10,
            badge: "Task 10 • General Vibe",
            situation: "Ситуація: Новий стример дуже кумедний і піднімає настрій усім глядачам.",
            wrong: "Glitch: The new streamer is quite miserable.",
            options: [
                "The new streamer is unreliable cheerful.",
                "The new streamer is pretty cheerful and fun.",
                "The new streamer is rather selfish and fun."
            ],
            correctIdx: 1,
            explain: "💡 'Pretty cheerful' = доволі/достатньо життєрадісний.",
            audioText: "The new streamer is pretty cheerful and fun."
        }
    ];

    let score = 0;
    let completedCount = 0;

    function renderQuiz() {
        const container = document.getElementById('quiz-list');
        container.innerHTML = '';

        questions.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `card-${q.id}`;

            card.innerHTML = `
                <div class="badge">${q.badge}</div>
                <div class="situation"><b>Ситуація:</b> ${q.situation}</div>
                <div class="wrong-sentence">❌ ${q.wrong}</div>

                <div class="options-grid" id="options-${q.id}">
                    ${q.options.map((opt, i) => `
                        <button class="option-btn" onclick="selectOption(${q.id}, ${i})">
                            ${opt}
                        </button>
                    `).join('')}
                </div>

                <div id="feedback-${q.id}" class="feedback hidden"></div>
            `;

            container.appendChild(card);
        });
    }

    function selectOption(qId, selectedIdx) {
        const q = questions.find(item => item.id === qId);
        const optionsContainer = document.getElementById(`options-${qId}`);
        const buttons = optionsContainer.querySelectorAll('.option-btn');
        const feedbackElem = document.getElementById(`feedback-${qId}`);

        // Отключаем все кнопки в карточке
        buttons.forEach(btn => btn.disabled = true);

        if (selectedIdx === q.correctIdx) {
            buttons[selectedIdx].classList.add('correct-choice');
            feedbackElem.innerHTML = `
                <div style="color: var(--success); margin-bottom: 8px;">✅ <b>Correct Vibe!</b> ${q.explain}</div>
                <button class="audio-btn" onclick="speakText('${q.audioText}')">🔊 Прослухати речення</button>
            `;
            score += 10;
            speakText(q.audioText);
        } else {
            buttons[selectedIdx].classList.add('wrong-choice');
            buttons[q.correctIdx].classList.add('correct-choice');
            feedbackElem.innerHTML = `
                <div style="color: var(--error); margin-bottom: 8px;">❌ <b>Помилка!</b> ${q.explain}</div>
            `;
        }

        feedbackElem.classList.remove('hidden');
        completedCount++;
        updateStats();
    }

    function speakText(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }
    }

    function updateStats() {
        document.getElementById('score').textContent = score;
        document.getElementById('progress-text').textContent = `${completedCount} / ${questions.length}`;
        
        const percentage = (completedCount / questions.length) * 100;
        document.getElementById('progress-bar').style.width = `${percentage}%`;

        if (completedCount === questions.length) {
            setTimeout(() => {
                confetti({
                    particleCount: 200,
                    spread: 120,
                    origin: { y: 0.5 }
                });
            }, 300);
        }
    }

    renderQuiz();
</script>

</body>
</html>
