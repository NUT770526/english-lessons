
<!DOCTYPE html><html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Odd One Out PRO RU</title>
<style>
body{margin:0;font-family:Segoe UI,Arial;background:linear-gradient(135deg,#5b7cff,#7ee8fa);display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#fff;width:min(920px,94vw);padding:28px;border-radius:24px;box-shadow:0 18px 45px rgba(0,0,0,.18)}
h1{text-align:center;color:#244}
#barwrap{height:12px;background:#e8eef8;border-radius:8px;overflow:hidden;margin:16px 0}
#bar{height:100%;width:0;background:linear-gradient(90deg,#4f46e5,#22c55e)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.opt{padding:18px;border:2px solid #dbe4ff;border-radius:16px;background:#f8fbff;text-align:center;font-size:22px;cursor:pointer}
.opt:hover{background:#eef4ff}
#fb{margin:18px 0;font-size:20px;min-height:90px}
button{padding:12px 24px;border:none;border-radius:12px;background:#2563eb;color:#fff;font-size:16px;cursor:pointer}
</style></head><body><div class="card">
<h1>🎯 Odd One Out PRO</h1>
<div id="barwrap"><div id="bar"></div></div>
<p><b>Выберите слово, которое не подходит к остальным.</b></p>
<div class="grid" id="grid"></div>
<div id="fb"></div>
<div style="text-align:center"><button onclick="nextQ()">Следующее задание</button></div>
</div>
<script>
const rounds=[
{w:["mountain","charity","announcement","blind"],a:"mountain",e:"«Mountain» — лишнее, потому что это объект природы. Остальные слова относятся к людям или обществу."},
{w:["announce","announcement","attend","mountain"],a:"mountain",e:"«Announce», «announcement» и «attend» часто используются при разговоре о событиях и мероприятиях."},
{w:["both","among","also","charity"],a:"charity",e:"Первые три слова — служебные слова языка. «Charity» — существительное."},
{w:["flaw","blind","strangers","also"],a:"also",e:"«Also» — наречие. Остальные слова называют людей или качества."},
{w:["at the weekend","on weekdays","since","the best way"],a:"the best way",e:"Первые три связаны со временем. «The best way» — это выражение о способе действия."},
{w:["necessary","blind","both","flaw"],a:"both",e:"«Both» — служебное слово. Остальные — существительное или прилагательные."},
{w:["I have no idea","it is not clear to me","it depends on","mountain"],a:"mountain",e:"Первые три — полезные разговорные фразы."},
{w:["announce","attend","also","announcement"],a:"also",e:"Три слова относятся к теме мероприятий. «Also» просто означает «также»."},
{w:["charity","strangers","among","mountain"],a:"mountain",e:"Три слова обычно используются при разговоре о людях или обществе."},
{w:["miss the chance","the best way","at the weekend","also"],a:"also",e:"Первые три — устойчивые выражения. «Also» — одно отдельное слово."}
];
let qs=[...rounds].sort(()=>Math.random()-0.5),i=0,locked=false;
function draw(){
 if(i>=qs.length){document.querySelector(".card").innerHTML="<h1>🏆 Отлично!</h1><h2 style='text-align:center'>Все 10 заданий выполнены.</h2>";return;}
 locked=false;fb.innerHTML="";
 bar.style.width=(i/qs.length*100)+"%";
 let arr=[...qs[i].w].sort(()=>Math.random()-0.5);
 grid.innerHTML="";
 arr.forEach(v=>{
 let d=document.createElement("div");
 d.className="opt";d.textContent=v;
 d.onclick=()=>pick(d,v);
 grid.appendChild(d);
 });
}
function pick(el,v){
 if(locked)return;locked=true;
 let r=qs[i];
 if(v===r.a){
   el.style.background="#dcfce7";
   fb.innerHTML="<b style='color:#15803d'>✔ Верно!</b><br><br>"+r.e;
 }else{
   el.style.background="#fee2e2";
   fb.innerHTML="<b style='color:#b91c1c'>✘ Небольшая ошибка.</b><br><b>Правильный ответ:</b> "+r.a+"<br><br>"+r.e;
 }
}
function nextQ(){if(!locked)return;i++;draw();}
draw();
</script></body></html>
