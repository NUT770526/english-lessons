<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Definitions with Words</title>
<style>
  body{
    font-family: Arial, sans-serif;
    background:#f4f7ff;
    color:#102044;
    margin:0;
    padding:24px;
    font-size:20px;
  }
  .container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:28px;
    border-radius:20px;
    box-shadow:0 8px 28px rgba(0,0,0,.08);
  }
  h1{
    color:#1b2fbf;
    text-align:center;
    font-size:34px;
    margin-bottom:8px;
  }
  .subtitle{
    text-align:center;
    color:#667085;
    margin-bottom:24px;
  }
  .note{
    background:#eef3ff;
    border-left:6px solid #1b2fbf;
    padding:14px;
    border-radius:12px;
    margin-bottom:24px;
    line-height:1.45;
  }
  .game{
    display:grid;
    grid-template-columns: 1.4fr 1fr;
    gap:22px;
  }
  .definition{
    background:#f3f4f8;
    border-radius:14px;
    padding:16px;
    margin:14px 0;
    min-height:54px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }
  .drop{
    min-height:48px;
    border:2px dashed #8ea0ff;
    border-radius:12px;
    background:#fff;
    margin-top:10px;
    padding:8px;
  }
  .wordsBox{
    background:#f8fbff;
    border:1px solid #d7e4ff;
    border-radius:16px;
    padding:16px;
  }
  .word{
    background:#1b2fbf;
    color:white;
    border-radius:12px;
    padding:12px 14px;
    margin:10px 0;
    cursor:grab;
    user-select:none;
    text-align:center;
    font-weight:bold;
  }
  .word:active{cursor:grabbing;}
  button{
    background:#1b2fbf;
    color:white;
    border:none;
    border-radius:12px;
    padding:12px 18px;
    font-size:18px;
    cursor:pointer;
    margin:18px 6px 0 0;
  }
  button:hover{background:#3146dc;}
  .result{
    font-weight:bold;
    margin-top:10px;
    font-size:19px;
  }
  .correct{color:#15803d;}
  .wrong{color:#b42318;}
  @media(max-width:760px){
    .game{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="container">
  <h1>Match the definitions with the words</h1>
  <p class="subtitle">Drag the word to the correct definition.</p>

  <div class="note">
    <b>How to play:</b> Read the definition on the left. Then drag the correct word from the right into the empty box.
  </div>

  <div class="game">
    <div id="definitions"></div>

    <div class="wordsBox">
      <h2>Words</h2>
      <div id="words"></div>
    </div>
  </div>

  <button onclick="checkAnswers()">Check answers</button>
    <button onclick="resetGame()">Reset</button>
  <div id="finalResult" class="result"></div>
</div>

<script>
const pairs = [
  ["A lot of things in a messy way", "Clutter"],
  ["To keep asking or complaining", "To nag"],
  ["A group of things stacked on top of each other", "Pile"],
  ["A compromise or agreement", "Middle ground"],
  ["Complete disorder or confusion", "Chaos"],
  ["Show who I am", "Express myself"],
  ["Not clean or organised", "Mess"],
  ["Clean and tidy", "Neat"]
];

let dragged = null;

function shuffle(arr){
  return arr.map(x=>[Math.random(),x]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]);
}

function makeWord(text){
  const div = document.createElement("div");
  div.className = "word";
  div.draggable = true;
  div.textContent = text;
  div.addEventListener("dragstart", () => dragged = div);
  return div;
}

function allowDrop(e){ e.preventDefault(); }

function drop(e){
  e.preventDefault();
  const target = e.currentTarget;
  if(!dragged) return;

  if(target.classList.contains("drop")){
    if(target.children.length > 0){
      document.getElementById("words").appendChild(target.children[0]);
    }
    target.appendChild(dragged);
  }
}

function render(){
  const defBox = document.getElementById("definitions");
  const wordsBox = document.getElementById("words");
  defBox.innerHTML = "";
  wordsBox.innerHTML = "";

  pairs.forEach((pair, i)=>{
    defBox.innerHTML += `
      <div class="definition">
        <b>${i+1}. ${pair[0]}</b>
        <div class="drop" id="drop${i}" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
        <div id="res${i}" class="result"></div>
      </div>`;
  });

  shuffle(pairs.map(p=>p[1])).forEach(word=>{
    wordsBox.appendChild(makeWord(word));
  });

  document.getElementById("finalResult").textContent = "";
}

function checkAnswers(){
  let score = 0;
  pairs.forEach((pair,i)=>{
    const box = document.getElementById("drop"+i);
    const user = box.children.length ? box.children[0].textContent : "";
    const res = document.getElementById("res"+i);

    if(user === pair[1]){
      score++;
      res.textContent = "Correct!";
      res.className = "result correct";
    } else {
      res.textContent = "Try again. Correct answer: " + pair[1];
      res.className = "result wrong";
    }
  });

  const final = document.getElementById("finalResult");
  final.textContent = `Your score: ${score}/${pairs.length}`;
  final.className = score === pairs.length ? "result correct" : "result wrong";
}



function resetGame(){
  render();
}

render();
</script>
</body>
</html>
